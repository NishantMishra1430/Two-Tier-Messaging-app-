name: Messaging App Deployment
on:
  push:
    branches:
      - main

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate custom version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/app:${{ env.VERSION }}

      - name: Update on Docker compose server
        run: |
          sed -i "s|image: .*$|image: ${{ vars.DOCKER_USERNAME }}/app:${{ env.VERSION }}|" compose.yaml && \
          docker compose up -d --build

      - name: git push 
        run: |
          git config --global user.name: ${{ vars.GUSERNAME }}
          git config --global user.email: ${{ vars.GEMAIL }} 
          git add compose.yaml
          git commit -m "Update Docker image version to ${{ env.VERSION }}"
          git push origin main 
          }
          
      - name: Success Bell
        run: echo "Deployment successful! 🎉"


          